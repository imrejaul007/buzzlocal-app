name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  deploy-android:
    name: Deploy Android
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v2

      - name: Build Production Android
        run: |
          npx expo prebuild --platform android --clean --no-install
          cd android && ./gradlew assembleRelease

      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -n "$FIREBASE_TOKEN" ]; then
            npx firebase appdistribution:distribute android/app/build/outputs/apk/release/app-release.apk \
              --app ${{ secrets.FIREBASE_APP_ID }} \
              --token "$FIREBASE_TOKEN"
          fi

  deploy-ios:
    name: Deploy iOS
    runs-on: macos-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Build iOS Production
        run: |
          npx expo prebuild --platform ios --clean --no-install

      - name: Build for iOS
        run: |
          cd ios && xcodebuild -workspace BuzzLocal.xcworkspace \
            -scheme BuzzLocal \
            -configuration Release \
            -archivePath BuzzLocal.xcarchive \
            -archive

      - name: Export to IPA
        run: |
          cd ios && \
          xcodebuild -exportArchive \
            -archivePath BuzzLocal.xcarchive \
            -exportPath output \
            -exportOptionsPlist BuzzLocal/Info.plist

  deploy-expo:
    name: Deploy to Expo
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Expo
        run: npx expo publish --release-channel production
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  deploy-testflight:
    name: Deploy to TestFlight
    runs-on: macos-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Build for TestFlight
        run: |
          npx expo prebuild --platform ios --clean --no-install

      - name: Submit to TestFlight
        run: |
          cd ios && \
          xcodebuild -workspace BuzzLocal.xcworkspace \
            -scheme BuzzLocal \
            -configuration Release \
            -destination "generic platform=iOS" \
            -archivePath BuzzLocal.xcarchive \
            -archive && \
          xcodebuild -exportArchive \
            -archivePath BuzzLocal.xcarchive \
            -exportPath output \
            -exportOptionsPlist BuzzLocal/Info.plist

      - name: Upload to App Store Connect
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
        run: |
          if [ -n "$APPLE_API_KEY" ]; then
            xcrun altool --upload-app \
              --type ios \
              --file output/BuzzLocal.ipa \
              --apiKey "$APPLE_API_KEY_ID" \
              --apiIssuer "$APPLE_ISSUER_ID"
          fi
